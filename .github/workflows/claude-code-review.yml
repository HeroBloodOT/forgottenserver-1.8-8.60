name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

jobs:
  claude-review-disabled:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.user.login == github.repository_owner) ||
      ((github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
       github.event.comment.user.login == github.repository_owner &&
       contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Claude Code Review disabled
        run: |
          echo "Claude Code Review is disabled because this repository only allows GitHub-owned or Mateuzkl-owned actions."
          echo "anthropics/claude-code-action@v1 is currently blocked by repository Actions permissions."
          echo "Use CodeRabbit or enable third-party actions in repository settings if Claude is needed."
