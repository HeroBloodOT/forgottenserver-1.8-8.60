name: Static analysis

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tools/static-analysis/**'
      - '.clang-tidy'
      - '.cppcheck-suppressions.txt'
      - '.github/workflows/static-analysis.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    name: Cppcheck and Lizard baseline
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck python3-pip
          python3 -m pip install lizard

      - name: Run Cppcheck baseline
        run: |
          mkdir -p analysis-reports
          cppcheck src \
            --enable=warning,style,performance,portability \
            --std=c++23 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppressions-list=.cppcheck-suppressions.txt \
            -ibuild-analysis -ivcpkg_installed -ibuild -i.git -idata -imodules -iscreenshots -idocs \
            --template='{file}:{line}:{column}: {severity}: {message} [{id}]' \
            2> analysis-reports/cppcheck.txt

      - name: Run Lizard baseline
        if: always()
        run: |
          lizard -V -C 20 -L 180 -a 8 src > analysis-reports/lizard.txt || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: static-analysis-reports
          path: analysis-reports/
